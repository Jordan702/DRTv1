<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DRTv1 - Evolution Through Contribution</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 2rem;
      background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2e7d32;
      text-align: center;
    }
    p.slogan {
      text-align: center;
      font-style: italic;
      color: #555;
      margin-bottom: 2rem;
    }
    .logo-row {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 1rem;
    }
    .logo {
      width: 80px;
      height: auto;
    }
    input, textarea, button {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      background-color: #2e7d32;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background-color: #1b5e20;
    }
    #status {
      margin-top: 1rem;
      font-weight: bold;
      text-align: center;
      color: #00796b;
    }
    #estimate {
      font-size: 1.2rem;
      text-align: center;
      margin-top: 0.5rem;
      color: #333;
    }
    .links {
      text-align: center;
      margin-top: 2rem;
    }
    .links a {
      display: block;
      color: #2e7d32;
      font-weight: bold;
      margin-bottom: 0.5rem;
      text-decoration: none;
    }
    .links code {
      font-size: 0.9rem;
      display: block;
      margin: 0.25rem auto 1rem auto;
      color: #444;
      word-wrap: break-word;
      white-space: normal;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-row">
      <img src="DRTv1 Logo.png" alt="DRTv1 Logo" class="logo" />
      <img src="sETH Logo.png" alt="sETH Logo" class="logo" />
    </div>
    <h1>DRT Redemption Portal</h1>
    <p class="slogan">Evolution Through Contribution</p>

    <form id="redeemForm">
      <label for="wallet">Your Wallet Address:</label>
      <input type="text" id="wallet" name="wallet" required />

      <label for="amount">Amount of sETH to Redeem:</label>
      <input type="number" step="0.00001" id="amount" name="amount" required />

      <button type="submit">Redeem sETH</button>
    </form>

    <div id="status"></div>
    <div id="estimate"></div>

    <div class="links">
      <a href="https://github.com/Jordan702/DRTv1/raw/main/drtv1-frontend/sETH_Whitepaper.pdf" target="_blank">
        📄 View the sETH Whitepaper (PDF)
      </a>
      <a href="https://jordan702.github.io/DRTv1/" target="_blank">
        🔙 Return to DRTv1 Landing Page
      </a>
      <strong>sETH Token Address:</strong>
      <code>0x98C29B3A30A118351D56589DD3622b89551e2dA3</code>
      <strong>DRTv1 Token Address:</strong>
      <code>0x732715C246A0A887e976c7c1145FbDec3FC646ac</code>
    </div>
  </div>
</body>
</html>

<script>
  const form = document.getElementById('redeemForm');
  const status = document.getElementById('status');
  const estimate = document.getElementById('estimate');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    status.textContent = '⏳ Processing redemption...';
    status.style.color = '#00796b';
    estimate.textContent = '';

    const formData = new FormData(form);

    try {
      const response = await fetch('https://drtv1-backend.onrender.com/api/redeem', {
        method: 'POST',
        body: formData
      });

      const rawText = await response.text();
      let result;

      try {
        result = JSON.parse(rawText);
      } catch (jsonErr) {
        console.error('❌ JSON parse error:', jsonErr);
        status.textContent = '⚠️ Server error: Unexpected response.';
        status.style.color = 'red';
        return;
      }

      if (response.ok) {
        status.textContent = result.message || '✅ Redemption successful!';
        status.style.color = 'green';

        if (result.redeemedAmount) {
          estimate.textContent = `💰 You received: ${result.redeemedAmount} ETH`;
        }
      } else {
        status.textContent = `❌ Error: ${result.error || 'Redemption failed.'}`;
        status.style.color = 'red';
      }
    } catch (err) {
      console.error('🚫 Network error:', err);
      status.textContent = `🚫 Unable to connect: ${err.message || 'Unknown error'}`;
      status.style.color = 'red';
    }
  });
</script>
