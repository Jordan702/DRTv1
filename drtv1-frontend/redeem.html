<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRTv1 - Evolution Through Contribution</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 2rem;
      background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2e7d32;
      text-align: center;
    }
    p.slogan {
      text-align: center;
      font-style: italic;
      color: #555;
      margin-bottom: 2rem;
    }
    .logo {
      display: block;
      margin: 0 auto 1rem auto;
      width: 80px;
    }
    input, textarea, button {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      background-color: #2e7d32;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background-color: #1b5e20;
    }
    #status {
      margin-top: 1rem;
      font-weight: bold;
      text-align: center;
      color: #00796b;
    }
    #estimate {
      font-size: 1.2rem;
      text-align: center;
      margin-top: 0.5rem;
      color: #333;
    }
  <title>Redeem sETH for ETH</title>
  <h1>DRT Redemption Portal</h1>
  <form id="redeemForm">
    <label for="wallet">Your Wallet Address:</label><br>
   <input type="text" id="wallet" name="wallet" required><br><br>
 </style>
</head>
</html>
