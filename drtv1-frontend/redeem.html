<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRT sETH Redemption Portal</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 2rem;
      background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      color: #333;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    h1 {
      color: #2e7d32;
      text-align: center;
    }
    input, button {
      width: 100%;
      margin-bottom: 1rem;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      background-color: #2e7d32;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    #status {
      margin-top: 1rem;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Redeem sETH for ETH</h1>

    <label for="amount">Amount of sETH to Redeem:</label>
    <input type="number" step="0.000001" id="amount" required />
    <button onclick="redeemSETH()">Redeem</button>

    <div id="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.min.js"></script>
  <script>
    const vaultAddress = "0x76482657Be35288632F0417cB6CD665e4b5bF09C"; // sETHVaultv2
    const vaultABI = [
      "function redeemForETH(uint256 amount) public",
    ];

    async function redeemSETH() {
      const status = document.getElementById('status');
      const amountInput = document.getElementById('amount').value;

      if (!window.ethereum) {
        return status.textContent = "MetaMask is required to redeem sETH.";
      }

      try {
        await ethereum.request({ method: 'eth_requestAccounts' });
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        const vault = new ethers.Contract(vaultAddress, vaultABI, signer);

        const parsedAmount = ethers.parseUnits(amountInput, 18);
        const tx = await vault.redeemForETH(parsedAmount);
        status.textContent = `Transaction sent. Waiting for confirmation...`;
        await tx.wait();
        status.textContent = `✅ Redeemed successfully. TX: ${tx.hash}`;
      } catch (err) {
        console.error("Redemption failed:", err);
        status.textContent = `❌ ${err.message}`;
      }
    }
  </script>
</body>
</html>
